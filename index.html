<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart EventFlow AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- LEFT PANEL -->
        <div class="left-panel">
            <p class="status">🟢 System Live</p>

            <h2>🔥 Crowd Heatmap</h2>
            <div class="heatmap">
                <div class="cell" id="c1">Gate A</div>
                <div class="cell" id="c2">Gate B</div>
                <div class="cell" id="c3">Food</div>
                <div class="cell" id="c4">Washroom</div>
            </div>

            <h2>📍 Stadium Map</h2>
            <div class="map">
                <div class="zone">Gate A</div>
                <div class="zone">Gate B</div>
                <div class="zone">Food</div>
                <div class="zone">Seats</div>
            </div>
        </div>

        <!-- CENTER PANEL -->
        <div class="center-panel">

            <h1>🚀 Smart EventFlow AI</h1>
            <p class="subtitle">AI-Powered Stadium Experience System</p>

            <div class="dashboard">

                <div class="card">
                    <h3>📍 Active Zone</h3>
                    <p id="zone">--</p>
                </div>

                <div class="card">
                    <h3>👥 Crowd Level</h3>
                    <p id="crowd">--</p>
                    <div class="progress">
                        <div id="bar"></div>
                    </div>
                </div>

                <div class="card highlight">
                    <h3>🧠 AI Suggestion</h3>
                    <p id="suggestion">Click simulate</p>
                </div>

            </div>

            <button onclick="simulate()">⚡ Simulate Live Data</button>

        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">

            <h2>🤖 AI Assistant</h2>
            <div class="chatbox">
                <div id="chat"></div>
                <div style="display:flex;">
                    <input type="text" id="input" placeholder="Ask something...">
                    <button onclick="send()">Send</button>
                </div>
            </div>

        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>

</html>
